name: Documentation

on:
  pull_request:
    paths:
      - "README.md"
      - "taskchain.md"
      - "release.md"
      - "changelog.md"
      - "mkdocs.yml"
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPECTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Check out exact submitted head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Assert exact head
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install documentation toolchain
        run: python -m pip install --require-virtualenv=false "mkdocs==1.6.1"

      - name: Build documentation strictly
        run: mkdocs build --strict

      - name: Record artifact digest
        run: |
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -czf docs-site.tar.gz site
          sha256sum docs-site.tar.gz | tee docs-site.sha256

      - name: Upload retained documentation evidence
        uses: actions/upload-artifact@v4
        with:
          name: docs-site-${{ env.EXPECTED_SHA }}
          path: |
            site/
            docs-site.tar.gz
            docs-site.sha256
          if-no-files-found: error
          retention-days: 90
