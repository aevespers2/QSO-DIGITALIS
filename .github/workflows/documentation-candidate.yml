name: QSO-DIGITALIS Documentation Candidate

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - "taskchain.md"
      - "punchlist.md"
      - "release.md"
      - "changelog.md"
      - "scripts/check_documentation.py"
      - "tests/test_check_documentation.py"
      - ".consent/consent-capacity-lock-v1.json"
      - ".github/workflows/documentation-candidate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qso-digitalis-documentation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-documentation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUBMITTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ env.SUBMITTED_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: ""

      - name: Assert immutable source and required inputs
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SUBMITTED_SHA"
          test -z "$(git status --porcelain)"
          required=(
            README.md
            docs/index.md
            docs/project-overview.md
            docs/architecture.md
            docs/contract-boundary.md
            docs/onboarding.md
            docs/developer-guide.md
            taskchain.md
            punchlist.md
            release.md
            changelog.md
            scripts/check_documentation.py
            tests/test_check_documentation.py
            .consent/consent-capacity-lock-v1.json
          )
          for path in "${required[@]}"; do test -f "$path"; done
          evidence="$RUNNER_TEMP/qso-digitalis-documentation-evidence"
          mkdir -p "$evidence"
          {
            printf 'repository=%s\n' "$GITHUB_REPOSITORY"
            printf 'source_sha=%s\n' "$SUBMITTED_SHA"
            printf 'workflow_run=%s\n' "$GITHUB_RUN_ID"
            printf 'workflow_attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
          } | tee "$evidence/source-identity.txt"

      - name: Validate documentation
        id: validator
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/qso-digitalis-documentation-evidence"
          python3 scripts/check_documentation.py \
            --output "$evidence/documentation-report.json" \
            > "$evidence/documentation-validator.txt" 2>&1
          status=$?
          cat "$evidence/documentation-validator.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run hostile regressions
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/qso-digitalis-documentation-evidence"
          python3 -m unittest tests.test_check_documentation -v \
            > "$evidence/documentation-tests.txt" 2>&1
          status=$?
          cat "$evidence/documentation-tests.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record deterministic source hashes
        shell: bash
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/qso-digitalis-documentation-evidence"
          sha256sum \
            README.md \
            docs/index.md \
            docs/project-overview.md \
            docs/architecture.md \
            docs/contract-boundary.md \
            docs/onboarding.md \
            docs/developer-guide.md \
            taskchain.md \
            punchlist.md \
            release.md \
            changelog.md \
            scripts/check_documentation.py \
            tests/test_check_documentation.py \
            .consent/consent-capacity-lock-v1.json \
            .github/workflows/documentation-candidate.yml \
            > "$evidence/input-sha256.txt"
          git diff --exit-code
          git diff --cached --exit-code
          test -z "$(git status --porcelain)"

      - name: Upload retained evidence
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: qso-digitalis-documentation-${{ env.SUBMITTED_SHA }}
          path: ${{ runner.temp }}/qso-digitalis-documentation-evidence
          if-no-files-found: error
          retention-days: 30

      - name: Fail closed on unsuccessful validation
        shell: bash
        env:
          VALIDATOR_STATUS: ${{ steps.validator.outputs.status }}
          TEST_STATUS: ${{ steps.tests.outputs.status }}
        run: |
          set -euo pipefail
          test "$VALIDATOR_STATUS" = "0"
          test "$TEST_STATUS" = "0"
