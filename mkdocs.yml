site_name: QSO-DIGITALIS
site_description: Architecture and decision documentation for the proposed QSO-DIGITALIS evidence-exchange contract
repo_url: https://github.com/aevespers2/QSO-DIGITALIS
repo_name: aevespers2/QSO-DIGITALIS
edit_uri: edit/main/docs/
strict: true
theme:
  name: mkdocs
nav:
  - Home: index.md
  - Project overview: project-overview.md
  - Architecture:
      - Architecture outline: architecture.md
      - Diagrams: diagrams.md
      - Design contracts: design-contracts.md
  - Governance:
      - Charter decision: charter-decision.md
      - Security and privacy: security-privacy.md
      - Limitations: limitations.md
  - Development:
      - Onboarding: onboarding.md
      - Operations and recovery: operations.md
  - Decisions:
      - ADR-0001 — bounded field charter candidate: adr/0001-bounded-field-charter-candidate.md
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - fenced_code
  - tables
  - toc:
      permalink: true
